{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-white text-center"><h4>Cổng thông tin Đăng nhập</h4></div>
            <div class="card-body">
                <form method="POST">
    <div class="mb-3">
        <label>Tên đăng nhập:</label>
        <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Mật khẩu:</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <!-- 🔥 THÊM PHẦN NÀY -->
    <div class="mb-3">
        <label>Vai trò (chỉ chọn khi đăng ký):</label>
        <select name="role" class="form-select">
            <option value="student">Học sinh</option>
            <option value="admin">Admin</option>
        </select>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" name="action" value="login" class="btn btn-primary">
            Đăng Nhập
        </button>
        <div class="text-center mt-2">
        <a href="{{ url_for('forgot_password') }}">Quên mật khẩu?</a>
        </div>
    
        <button type="submit" name="action" value="register" class="btn btn-outline-secondary">
            Đăng Ký Mới
        </button>
    </div>

</form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
